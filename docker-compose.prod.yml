services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./ops/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro

  api-1: &api
    build:
      context: ./golx-backend
    restart: unless-stopped
    env_file:
      - ./golx-backend/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      BULLMQ_WORKERS_ENABLED: "false"
      BACKGROUND_AUTOMATIONS_ENABLED: "false"
      INJURY_RISK_AUTOMATION_ENABLED: "false"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  api-2:
    <<: *api

  worker-1: &worker
    build:
      context: ./golx-backend
    restart: unless-stopped
    env_file:
      - ./golx-backend/.env
    environment:
      NODE_ENV: production
      BULLMQ_ENABLED: "true"
    command: ["node", "src/workers/run.js"]

  worker-2:
    <<: *worker
