name: Deploy GOALIX Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: goalix-production
  cancel-in-progress: false

jobs:
  docker-validation:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    env:
      BACKEND_NODE_ENV: production
      POSTGRES_PASSWORD: ci-postgres-password
      JWT_SECRET: ci-jwt-secret-32-characters-minimum
      JWT_REFRESH_SECRET: ci-refresh-secret-32-characters-minimum
      COOKIE_SECRET: ci-cookie-secret-32-characters-minimum
      TOTP_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      CORS_ORIGINS: https://goalix.example.com
      MFA_ENFORCED_ROLES: admin,coach
      HTTP_PORT: 8080
      GOALIX_IMAGE_TAG: ci-${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production Compose
        run: docker compose -f docker-compose.prod.yml config --quiet

      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build api frontend

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: docker-validation
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
      DEPLOY_SHA: ${{ github.sha }}
    steps:
      - name: Configure SSH
        run: |
          set -Eeuo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_APP_PATH"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/goalix_deploy_key
          chmod 600 ~/.ssh/goalix_deploy_key
          PORT="${VPS_PORT:-22}"
          ssh-keyscan -p "$PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Pull latest code and deploy Docker stack
        run: |
          set -Eeuo pipefail
          PORT="${VPS_PORT:-22}"
          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/goalix_deploy_key -p "$PORT" "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_APP_PATH' && git fetch --prune origin && git checkout '$DEPLOY_BRANCH' && git pull --ff-only origin '$DEPLOY_BRANCH' && GOALIX_IMAGE_TAG='$DEPLOY_SHA' bash scripts/deploy-production.sh"
