name: Publish GOALIX Docker Images

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: goalix-docker-publish
  cancel-in-progress: false

env:
  BACKEND_IMAGE: goalix-backend
  FRONTEND_IMAGE: goalix-frontend

jobs:
  security:
    name: Test And Security Gate
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://goalix:goalix@127.0.0.1:5432/goalix_test
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-jwt-secret-32-characters-minimum
      JWT_REFRESH_SECRET: ci-refresh-secret-32-characters-minimum
      COOKIE_SECRET: ci-cookie-secret-32-characters-minimum
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Scan tracked artifacts
        run: npm run security:scan-dumps

      - name: Audit frontend production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint and build frontend
        run: |
          npm run lint
          npm run build

      - name: Install backend dependencies
        working-directory: golx-backend
        run: npm ci

      - name: Audit backend production dependencies
        working-directory: golx-backend
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint and test backend
        working-directory: golx-backend
        run: |
          npm run lint
          npm test

      - name: Audit Python model dependencies
        run: |
          python -m pip install --disable-pip-version-check pip-audit==2.10.1
          python -m pip_audit -r Models/requirements.txt

  publish:
    name: Build And Push Docker Images
    needs: security
    runs-on: ubuntu-latest
    env:
      BACKEND_NODE_ENV: production
      POSTGRES_PASSWORD: ci-postgres-password
      JWT_SECRET: ci-jwt-secret-32-characters-minimum
      JWT_REFRESH_SECRET: ci-refresh-secret-32-characters-minimum
      COOKIE_SECRET: ci-cookie-secret-32-characters-minimum
      CSRF_SECRET: ci-csrf-secret-32-characters-minimum
      TOTP_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      CORS_ORIGINS: https://goalix.example.com
      MFA_ENFORCED_ROLES: admin,coach
      HTTP_PORT: 8080
      HTTPS_PORT: 8443
      TLS_CERT_PATH: /tmp/goalix-ci-fullchain.pem
      TLS_KEY_PATH: /tmp/goalix-ci-privkey.pem
      GOALIX_IMAGE_TAG: ci-${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production Compose
        run: docker compose -f docker-compose.prod.yml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: golx-backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=goalix-backend
          cache-to: type=gha,mode=max,scope=goalix-backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_SOCKET_URL=
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=goalix-frontend
          cache-to: type=gha,mode=max,scope=goalix-frontend
